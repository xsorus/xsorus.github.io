<!doctype HTML>
<html lang = "PL">
    <head>
        <meta charset = "UTF-8">
        <title>
            Moja strona
        </title>
        <style>
            body{margin:0px 50px; }
            div{ font-size:150px; text-align:center; position: relative; top:200px;
            animation-name: kolor;
            animation-duration: 5s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            animation-delay: 1s;
            animation-play-state: running;
            animation-direction: alternate;}

            @keyframes kolor {
                0%{color: red;}
                25%{color: green;}
                50%{color: blue;}
                75%{color: yellow;}
                100%{color: pink;}
            }
        </style>
    </head>
    <body>
       <div>WÓJT JEST ZŁODZIEJ</div>
        
    </body>
</html>
